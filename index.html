<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Los Angeles Community College District</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --laccd-blue: #305589;
            --laccd-red: #C8102E;
            --cream: #fdfbf7;
            --charcoal: #1a1a1a;
            --gray-100: #f5f5f5;
            --gray-200: #e5e5e5;
            --gray-300: #d4d4d4;
            --gray-400: #a3a3a3;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f0f2f5 0%, #e8eef5 100%);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2rem;
        }
        
        .container {
            width: 100%;
            max-width: 600px;
            animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            margin: 2rem auto;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 3rem 2.5rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--gray-200);
        }
        
        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo-image {
            width: 200px;
            height: auto;
            margin: 0 auto 1.5rem;
            display: block;
        }
        
        .logo-text {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .logo-main {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--laccd-blue);
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }
        
        .logo-sub {
            font-size: 0.875rem;
            color: var(--gray-400);
            font-weight: 400;
            letter-spacing: 0.02em;
        }
        
        .welcome-section {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--gray-200);
        }
        
        .welcome-title {
            font-size: 1.75rem;
            color: var(--charcoal);
            margin-bottom: 0.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        
        .welcome-subtitle {
            color: var(--gray-400);
            font-size: 0.95rem;
            line-height: 1.6;
        }
        
        .form-container {
        }
        
        #companyhub-form {
            width: 100%;
        }
        
        #companyhub-form iframe {
            min-height: 800px !important;
            height: auto !important;
            border: none;
            overflow: visible !important;
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--gray-200);
        }
        
        .footer-link {
            color: var(--gray-400);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s ease;
        }
        
        .footer-link:hover {
            color: var(--laccd-blue);
        }
        
        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }
            
            .card {
                padding: 2rem 1.5rem;
            }
            
            .logo-image {
                width: 150px;
            }
            
            .welcome-title {
                font-size: 1.5rem;
            }
            
            .footer-links {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo-container">
                <img src="https://gstinc.com/wp-content/uploads/2025/07/LA-Community-College.png" alt="Los Angeles Community College District" class="logo-image">
                <div class="logo-text">
                    <span class="logo-main">LACCD</span>
                    <span class="logo-sub">Los Angeles Community College District</span>
                </div>
            </div>
            
            <div class="welcome-section">
                <h1 class="welcome-title">Welcome</h1>
                <p class="welcome-subtitle">Sign in to access your student portal and resources</p>
            </div>
            
            <div class="form-container">
                <div id="companyhub-form"></div>
            </div>
            
            <div class="footer-links">
                <a href="https://www.laccd.edu/" class="footer-link">About LACCD</a>
                <a href="#" class="footer-link">Help & Support</a>
                <a href="#" class="footer-link">Privacy Policy</a>
            </div>
        </div>
    </div>
    
    <script src="https://app.companyhub.com/scripts/companyhub.forms.js"></script>
    <script>
        companyhubForms.render("https://app.companyhub.com/webtolead/renderform/Mjc1MTg1?name=Los_AngelesCommunityCollegeDistrict", "companyhub-form");
    </script>
</body>
</html>
